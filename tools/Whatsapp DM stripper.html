<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>WhatsApp DM stripper</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <style>
*, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

:root {
    --bg: #000000;
    --surface: #080808;
    --surface2: #101010;
    --border: #2f3336;
    --accent: #7c6bff;
    --accent2: #ff6b9d;
    --text: #e8e8ff;
    --muted: #6b6b8a;
    --neg: #ff6b6b;
    --font-text: BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --font-display: 'Syne', sans-serif;
}

::-webkit-scrollbar { width: 7px; }
::-webkit-scrollbar-thumb { background-color: var(--border); border-radius: 10px; }
body::-webkit-scrollbar { width: 0; }

body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-text);
    font-size: 13px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
}

/* Header */
.layout-header {
    height: 48px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 25px;
    background: var(--surface);
    z-index: 10;
}

.logo {
    font-family: var(--font-display);
    font-weight: 800;
    font-size: 20px;
    letter-spacing: -0.5px;
    color: var(--accent);
}

.logo span { color: #fff; }

/* Main layout */
.main {
    display: flex;
    flex: 1;
    height: calc(100vh - 48px);
}

/* Left panel */
.sidebar {
    width: 380px;
    flex-shrink: 0;
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
}

.panel {
    background: #000;
    border-bottom: 1px solid var(--border);
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    font-family: var(--font-text);
}

.panel-title {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 6px;
}

/* Drop zone */
.drop-zone {
    border: 2px dashed var(--border);
    border-radius: 10px;
    padding: 28px 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.25s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    background: var(--surface2);
    position: relative;
}

.drop-zone:hover, .drop-zone.drag-over {
    border-color: var(--accent);
    background: #3498db10;
}

.drop-zone input {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
}

.drop-icon {
    font-size: 28px;
    line-height: 1;
}

.drop-label {
    font-size: 12px;
    color: var(--text);
    font-family: var(--font-text);
    font-weight: 600;
}

.drop-sub {
    font-size: 10px;
    color: var(--muted);
    font-family: var(--font-text);
}

/* File info */
.file-info {
    display: none;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    gap: 10px;
    align-items: center;
    font-family: var(--font-text);
}

.file-info.visible { display: flex; }

.file-icon {
    font-size: 20px;
    flex-shrink: 0;
}

.file-details { overflow: hidden; flex: 1; }
.file-name { font-size: 12px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.file-size { font-size: 10px; color: var(--muted); margin-top: 2px; }

/* Stats */
.stats-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
}

.stat-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    text-align: center;
}

.stat-val {
    font-size: 18px;
    font-family: var(--font-display);
    font-weight: 700;
    color: #fff;
}

.stat-lbl {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    margin-top: 2px;
    font-family: var(--font-text);
}

/* Buttons */
button.action-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px;
    border-radius: 8px;
    font-family: var(--font-text);
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    text-align: left;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: space-between;
}

button.action-btn:hover {
    background: var(--border);
    border-color: var(--muted);
    color: #fff;
}

button.action-btn.primary {
    background: var(--accent);
    border-color: transparent;
    color: white;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
}

button.action-btn.primary:hover { filter: brightness(0.7); }
button.action-btn.primary:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; }

button.action-btn.secondary {
    background: transparent;
    border-color: var(--accent);
    color: var(--accent);
    justify-content: center;
    font-size: 12px;
}

button.action-btn.secondary:hover { background: #7c6bff15; }

/* Right panel - output */
.output-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

.output-header {
    height: 44px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 20px;
    background: var(--surface);
    flex-shrink: 0;
}

.output-title {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
    font-weight: 600;
    font-family: var(--font-text);
}

.output-body {
    flex: 1;
    overflow: hidden;
    position: relative;
}

/* Raw text view */
.raw-view {
    height: calc(100vh - 100px);
    overflow-y: auto;
    padding: 20px;
    font-family: var(--font-text);
    font-size: 13px;
    line-height: 1.8;
    color: var(--text);
    white-space: pre-wrap;
    word-break: break-word;
}

.raw-view .line-author {
    color: var(--accent);
    font-weight: 700;
}

.chat-empty {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: var(--muted);
    font-family: var(--font-text);
    height: 100%;
}

.chat-empty-icon { font-size: 40px; opacity: 0.4; }
.chat-empty-text { font-size: 14px; }
.chat-empty-sub { font-size: 11px; opacity: 0.6; }

/* Progress bar */
.progress-track {
    height: 2px;
    background: var(--surface2);
    border-radius: 2px;
    overflow: hidden;
}

.progress-bar {
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width 0.4s ease;
}
  </style>
</head>
<body>

<div class="layout-header">
  <div class="logo">WA<span>strip</span></div>
</div>

<div class="main">

  <div class="sidebar">

    <div class="panel">
      <div class="panel-title">① Input File</div>
      <div class="drop-zone" id="dropZone">
        <input type="file" id="fileInput" accept=".txt">
        <div class="drop-icon">💬</div>
        <div class="drop-label">Drop WhatsApp .txt export here</div>
        <div class="drop-sub">or click to browse</div>
      </div>
      <div class="file-info" id="fileInfo">
        <div class="file-icon">📄</div>
        <div class="file-details">
          <div class="file-name" id="fileName">—</div>
          <div class="file-size" id="fileSize">—</div>
        </div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-title">② Stats</div>
      <div class="stats-grid">
        <div class="stat-box"><div class="stat-val" id="statIn">0</div><div class="stat-lbl">Raw Lines</div></div>
        <div class="stat-box"><div class="stat-val" id="statOut">0</div><div class="stat-lbl">Cleaned Lines</div></div>
      </div>
    </div>

    <div class="panel" style="flex:1;">
      <div class="panel-title">③ Actions</div>
      <div class="progress-track" style="margin-bottom:4px;"><div class="progress-bar" id="progressFill"></div></div>
      <button class="action-btn primary" id="stripBtn" disabled>Strip Chat</button>
      <div style="display:flex; gap:8px;">
        <button class="action-btn secondary" id="copyBtn" disabled style="flex:1; justify-content:center;">Copy</button>
        <button class="action-btn secondary" id="downloadBtn" disabled style="flex:1; justify-content:center;">Download</button>
      </div>
    </div>

  </div>

  <div class="output-panel">
    <div class="output-header">
      <div class="output-title">Output Preview (Raw Text)</div>
    </div>
    <div class="output-body">
      <div class="raw-view" id="rawView">
        <div class="chat-empty" id="emptyPlaceholder">
          <div class="chat-empty-icon">💬</div>
          <div class="chat-empty-text">No output yet</div>
          <div class="chat-empty-sub">Load a WhatsApp export and hit Strip</div>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
const $ = id => document.getElementById(id);

let rawText = '';
let strippedLines = [];
let participants = [];

const colors = ['#7c6bff','#ff6b9d','#3498DB','#ff6b6b','#4a90e2','#f39c12','#e74c3c','#1abc9c'];
const participantColors = {};

function colorFor(name) {
  if (!participantColors[name]) {
    const keys = Object.keys(participantColors);
    participantColors[name] = colors[keys.length % colors.length];
  }
  return participantColors[name];
}

const dropZone = $('dropZone');
const fileInput = ['fileInput'];

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file) loadFile(file);
});

$('fileInput').addEventListener('change', () => {
  if ($('fileInput').files[0]) loadFile($('fileInput').files[0]);
});

function loadFile(file) {
  if (!file.name.endsWith('.txt') && !file.name.endsWith('.text')) {
    alert('Rejected: file must be a .txt WhatsApp export.');
    return;
  }
  const reader = new FileReader();
  reader.onload = e => {
    rawText = e.target.result;
    $('fileName').textContent = file.name;
    $('fileSize').textContent = formatBytes(file.size);
    $('fileInfo').classList.add('visible');
    $('stripBtn').disabled = false;
    $('statIn').textContent = rawText.split('\n').filter(l => l.trim()).length.toLocaleString();
  };
  reader.readAsText(file, 'utf-8');
}

function formatBytes(b) {
  if (b < 1024) return b + ' B';
  if (b < 1048576) return (b/1024).toFixed(1) + ' KB';
  return (b/1048576).toFixed(1) + ' MB';
}

$('stripBtn').onclick = () => {
  if (!rawText) return;
  $('progressFill').style.width = '30%';

  const lines = rawText.split('\n');
  const optEncryption = true;
  const optEmpty = true;

  const msgRegex = /^\d{1,2}\/\d{1,2}\/\d{2,4},\s*\d{1,2}:\d{2}(?:\s*[AP]M)?\s*-\s*/i;
  const encryptionNotice = /Messages and calls are end-to-end encrypted/i;
  const mediaOmitted = /<Media omitted>/i;
  const videonoteOmitted = /<Video note omitted>/i;
  const deletedMessage = /^This message was deleted$/i;
  const deletedMessage1 = /^You deleted this message$/i;

  const participantSet = new Set();
  strippedLines = [];
  let removedCount = 0;

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];
    const trimmed = line.trim();

    if (!trimmed) {
      if (!optEmpty) strippedLines.push('');
      else removedCount++;
      continue;
    }

    if (optEncryption && encryptionNotice.test(trimmed)) {
      removedCount++;
      continue;
    }

    if (msgRegex.test(trimmed)) {
      const withoutTimestamp = trimmed.replace(msgRegex, '');

      if (!withoutTimestamp.includes(': ') && !withoutTimestamp.match(/^.+?:/)) {
        removedCount++;
        continue;
      }

      if (mediaOmitted.test(withoutTimestamp)) {
        removedCount++;
        continue;
      }

      if (videonoteOmitted.test(withoutTimestamp)) {
        removedCount++;
        continue;
      }

      const cleanedTimestamp = withoutTimestamp.replace(
        /\s*<This message was edited>\s*/gi,
        ''
      );

      const colonIdx = cleanedTimestamp.indexOf(': ');

      if (colonIdx !== -1) {
        const author = cleanedTimestamp.substring(0, colonIdx).trim();
        const content = cleanedTimestamp.substring(colonIdx + 2).trim();

        if (deletedMessage.test(content)) {
          removedCount++;
          continue;
        }

        if (deletedMessage1.test(content)) {
          removedCount++;
          continue;
        }

        participantSet.add(author);
      }

      strippedLines.push(cleanedTimestamp);
    } else {
      if (mediaOmitted.test(trimmed)) {
        removedCount++;
        continue;
      }

      if (videonoteOmitted.test(trimmed)) {
        removedCount++;
        continue;
      }

      if (encryptionNotice.test(trimmed)) {
        removedCount++;
        continue;
      }

      const cleanedLine = trimmed
        .replace(/\s*<This message was edited>\s*/gi, '')
        .trim();

      if (deletedMessage.test(cleanedLine)) {
        removedCount++;
        continue;
      }

      if (deletedMessage1.test(cleanedLine)) {
        removedCount++;
        continue;
      }

      strippedLines.push(cleanedLine);
    }
  }

  if (optEmpty) {
    strippedLines = strippedLines.filter(l => l.trim() !== '');
  }

  participants = [...participantSet];
  participants.forEach(p => colorFor(p));

  $('progressFill').style.width = '70%';
  $('statOut').textContent = strippedLines.length.toLocaleString();

  setTimeout(() => {
    renderRaw();
    $('progressFill').style.width = '100%';
    $('copyBtn').disabled = false;
    $('downloadBtn').disabled = false;
    setTimeout(() => $('progressFill').style.width = '0%', 800);
  }, 100);
};

function renderRaw() {
  const view = $('rawView');
  if (!strippedLines.length) { 
    view.innerHTML = `
      <div class="chat-empty" id="emptyPlaceholder">
        <div class="chat-empty-icon">💬</div>
        <div class="chat-empty-text">No output yet</div>
        <div class="chat-empty-sub">Load a WhatsApp export and hit Strip</div>
      </div>`; 
    return; 
  }

  let html = '';
  for (const line of strippedLines) {
    if (!line.trim()) { html += '\n'; continue; }
    const colonIdx = line.indexOf(': ');
    if (colonIdx !== -1) {
      const author = line.substring(0, colonIdx);
      const content = escHtml(line.substring(colonIdx + 2));
      const color = colorFor(author);
      html += `<span class="line-author" style="color:${color}">${escHtml(author)}: </span>${content}\n`;
    } else {
      html += escHtml(line) + '\n';
    }
  }
  view.innerHTML = html;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

$('copyBtn').onclick = () => {
  const text = strippedLines.join('\n');
  navigator.clipboard.writeText(text).then(() => {
    $('copyBtn').textContent = 'Copied ✓';
    setTimeout(() => $('copyBtn').textContent = 'Copy', 1500);
  });
};

$('downloadBtn').onclick = () => {
  const text = strippedLines.join('\n');
  const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  const original = $('fileName').textContent.replace(/\.txt$/i, '');
  let name = original;
  name = name.replace(/^WhatsApp Chat with\s+/i, 'WA_');
  if (name === original) {
    name = 'WA_' + original;
  }
  a.download = name + '.txt';
  a.click();
  URL.revokeObjectURL(url);
};
</script>
</body>
</html>
